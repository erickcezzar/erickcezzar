<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      /* nave */
      @keyframes moveShip { 0%,100% { transform: translate(200px, 260px); } 50% { transform: translate(280px, 260px); } }
      .ship { animation: moveShip 4s ease-in-out infinite; }
      /* tiro */
      @keyframes shoot { 0% { opacity: 1; transform: translate(240px, 250px); } 100% { opacity: 0; transform: translate(240px, 0px); } }
      .bullet { animation: shoot 0.8s linear infinite; }
      /* meteoros */
      @keyframes fall1 { 0% { transform: translate(60px, -20px); } 100% { transform: translate(60px, 340px); } }
      @keyframes fall2 { 0% { transform: translate(180px, -40px); } 100% { transform: translate(180px, 340px); } }
      @keyframes fall3 { 0% { transform: translate(320px, -10px); } 100% { transform: translate(320px, 340px); } }
      @keyframes fall4 { 0% { transform: translate(420px, -30px); } 100% { transform: translate(420px, 340px); } }
      .meteor1 { animation: fall1 2.2s linear infinite; }
      .meteor2 { animation: fall2 2.8s linear 0.5s infinite; }
      .meteor3 { animation: fall3 2.4s linear 1s infinite; }
      .meteor4 { animation: fall4 3s linear 1.5s infinite; }
    </style>
  </defs>
  <!-- fundo -->
  <rect class="bg" width="480" height="320" />
  <!-- estrelas -->
  <circle cx="30" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.5"/>
  <circle cx="350" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="400" cy="100" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="50" cy="150" r="1" fill="white" opacity="0.8"/>
  <circle cx="450" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <!-- nave -->
  <g class="ship">
    <polygon points="220,270 260,270 240,250" fill="#00ffff" />
  </g>
  <!-- tiro -->
  <rect class="bullet" x="238" y="240" width="4" height="12" fill="#ff0" />
  <!-- meteoros -->
  <circle class="meteor1" cx="60" cy="0" r="12" fill="#ff5555" />
  <circle class="meteor2" cx="180" cy="0" r="14" fill="#ff9955" />
  <circle class="meteor3" cx="320" cy="0" r="10" fill="#ff5555" />
  <circle class="meteor4" cx="420" cy="0" r="13" fill="#ff9955" />
</svg>
